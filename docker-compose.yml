# Agentic GraphRAG - Docker Compose Configuration
# Neo4j + Qdrant for local development

services:
  # Neo4j - Graph Database
  neo4j:
    image: neo4j:latest
    container_name: graphrag-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant - Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: graphrag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: graphrag-backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - QDRANT_URL=http://qdrant:6333
      - LLM_PROVIDER=gemini
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=gemini-2.5-flash
      - PYTHONUNBUFFERED=1
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./test_data:/app/test_data
      - /c/Dev/ArcaneDepths:/app/ArcaneDepths:ro
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_storage:
