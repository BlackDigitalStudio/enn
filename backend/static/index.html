<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GraphRAG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--user-bg:#1c2d4a;--ai-bg:#1c1c2e;--green:#3fb950;--red:#f85149}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
header h1{font-size:15px;font-weight:600;letter-spacing:.3px}
header .status{margin-left:auto;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
header .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
header .dot.off{background:var(--red)}

/* Chat area */
.chat{flex:1;overflow-y:auto;padding:20px 20px 10px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:75%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.55;word-wrap:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:var(--user-bg);border-bottom-right-radius:4px}
.msg.ai{align-self:flex-start;background:var(--ai-bg);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.ai .sources{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
.msg.ai .metrics{font-size:10px;color:var(--muted);margin-top:6px;opacity:.7}
.msg.system{align-self:center;background:none;color:var(--muted);font-size:12px;padding:4px 12px}
.typing{align-self:flex-start;color:var(--muted);font-size:13px;padding:8px 16px}
.typing::after{content:'...';animation:dots 1.4s infinite}
@keyframes dots{0%,20%{content:'.'}40%{content:'..'}60%,100%{content:'...'}}

/* Input area */
.input-area{background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.input-area textarea{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:12px;font-size:14px;font-family:inherit;resize:none;max-height:120px;min-height:42px;line-height:1.4;outline:none;transition:border-color .2s}
.input-area textarea:focus{border-color:var(--accent)}
.input-area textarea::placeholder{color:var(--muted)}

/* Buttons */
.btn-icon{background:none;border:1px solid var(--border);color:var(--muted);width:42px;height:42px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
.btn-icon.send{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-icon.send:hover{opacity:.85}
.btn-icon svg{width:18px;height:18px}

/* Pipeline progress */
.pipeline-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;font-size:12px;color:var(--muted);display:none;align-items:center;gap:10px}
.pipeline-bar.active{display:flex}
.pipeline-bar .progress{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pipeline-bar .progress .fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:400px;max-width:90vw}
.modal h2{font-size:16px;margin-bottom:16px}
.modal input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;width:100%;font-size:14px;margin-bottom:12px}
.modal .btn{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;width:100%}
.modal .btn:hover{opacity:.85}
.modal .hint{font-size:12px;color:var(--muted);margin-bottom:12px}
</style>
</head>
<body>

<header>
  <h1>🧠 GraphRAG</h1>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">connecting...</span>
  </div>
</header>

<div class="pipeline-bar" id="pipelineBar">
  <span id="pipelineText">Pipeline: idle</span>
  <div class="progress"><div class="fill" id="pipelineFill" style="width:0%"></div></div>
</div>

<div class="chat" id="chat">
  <div class="msg system">Добро пожаловать. Задайте вопрос по загруженной базе знаний.</div>
</div>

<div class="input-area">
  <!-- Add project button -->
  <button class="btn-icon" onclick="showProjectModal()" title="Добавить проект">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
  </button>

  <!-- File upload button -->
  <button class="btn-icon" onclick="document.getElementById('fileInput').click()" title="Отправить файлы">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
  </button>
  <input type="file" id="fileInput" multiple hidden onchange="uploadFiles(this.files)">

  <textarea id="input" placeholder="Задайте вопрос..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>

  <button class="btn-icon send" onclick="sendMessage()" title="Отправить">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<!-- Add Project Modal -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <h2>📁 Добавить проект</h2>
    <div class="hint">Укажите путь к директории на сервере (внутри Docker-контейнера)</div>
    <input id="projectPath" placeholder="/app/test_data/ranobe" value="/app/test_data/ranobe">
    <button class="btn" onclick="startPipeline()">Запустить индексацию</button>
  </div>
</div>

<script>
const API = '/api/v1';
const chat = document.getElementById('chat');
const input = document.getElementById('input');

// Auto-resize textarea
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function addMsg(text, type, extra) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = text;
  if (extra) {
    if (extra.sources) {
      const s = document.createElement('div');
      s.className = 'sources';
      s.textContent = '📎 ' + extra.sources.map(s => `${s.type}:${s.name}`).slice(0, 5).join(', ');
      div.appendChild(s);
    }
    if (extra.metrics) {
      const m = document.createElement('div');
      m.className = 'metrics';
      m.textContent = `⏱ ${extra.metrics.total_time_s}s | 🔢 ${extra.metrics.total_tokens} tok | 📊 ${extra.metrics.context_nodes} nodes`;
      div.appendChild(m);
    }
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  addMsg(text, 'user');
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.textContent = 'Думаю';
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch(`${API}/agent/query`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question: text, top_k: 10, depth: 1})
    });
    typing.remove();
    if (!res.ok) {
      const err = await res.json();
      addMsg('❌ ' + (err.detail || 'Ошибка'), 'ai');
      return;
    }
    const data = await res.json();
    addMsg(data.answer, 'ai', {sources: data.sources, metrics: data.metrics});
  } catch(e) {
    typing.remove();
    addMsg('❌ Нет связи с сервером', 'ai');
  }
}

// Upload files
async function uploadFiles(files) {
  for (const file of files) {
    addMsg(`📎 Загружаю: ${file.name}`, 'system');
    const form = new FormData();
    form.append('file', file);
    try {
      const res = await fetch(`${API}/upload`, {method: 'POST', body: form});
      const data = await res.json();
      addMsg(`✅ ${file.name}: ${data.scan?.total_scanned || '?'} файлов найдено`, 'system');
    } catch(e) {
      addMsg(`❌ Ошибка загрузки ${file.name}`, 'system');
    }
  }
}

// Project modal
function showProjectModal() {
  document.getElementById('projectModal').classList.add('active');
}
document.getElementById('projectModal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('active');
});

async function startPipeline() {
  const dir = document.getElementById('projectPath').value.trim();
  if (!dir) return;
  document.getElementById('projectModal').classList.remove('active');

  const bar = document.getElementById('pipelineBar');
  const fill = document.getElementById('pipelineFill');
  const pText = document.getElementById('pipelineText');
  bar.classList.add('active');
  pText.textContent = 'Pipeline: запуск...';
  fill.style.width = '5%';

  addMsg(`🚀 Индексация: ${dir}`, 'system');

  try {
    const res = await fetch(`${API}/pipeline`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({directory: dir})
    });
    const data = await res.json();
    fill.style.width = '100%';
    if (data.success) {
      pText.textContent = `Pipeline: готово (${data.total_nodes} узлов, ${data.total_edges} рёбер, ${data.total_time_s}s)`;
      addMsg(`✅ Индексация завершена: ${data.total_nodes} узлов, ${data.total_edges} рёбер за ${data.total_time_s}s`, 'system');
    } else {
      pText.textContent = 'Pipeline: ошибка';
      addMsg('❌ Ошибка pipeline: ' + JSON.stringify(data.errors?.slice(0,3)), 'system');
    }
    setTimeout(() => bar.classList.remove('active'), 8000);
  } catch(e) {
    pText.textContent = 'Pipeline: ошибка связи';
    fill.style.width = '0%';
    addMsg('❌ Нет связи с сервером', 'system');
  }
}

// Health check
async function checkHealth() {
  try {
    const res = await fetch(`${API}/health`);
    const data = await res.json();
    document.getElementById('statusDot').className = 'dot' + (data.status === 'healthy' ? '' : ' off');
    document.getElementById('statusText').textContent = data.status === 'healthy'
      ? `${data.llm_model} · Neo4j ✓`
      : 'degraded';
  } catch {
    document.getElementById('statusDot').className = 'dot off';
    document.getElementById('statusText').textContent = 'offline';
  }
}
checkHealth();
setInterval(checkHealth, 30000);

// Stats on load
fetch(`${API}/stats`).then(r=>r.json()).then(d=>{
  if(d.total_nodes>0) addMsg(`📊 База: ${d.total_nodes} узлов, ${d.total_edges} рёбер, типы: ${d.node_types?.join(', ')}`, 'system');
}).catch(()=>{});
</script>
</body>
</html>
